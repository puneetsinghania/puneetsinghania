<svg width="360" height="88" viewBox="0 0 360 88" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Gmail contact button</title><desc id="desc">Clickable Gmail button for Puneet Singhania.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#3b0b12"/></linearGradient><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#f43f5e"/><stop offset="1" stop-color="#fb7185"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.k{font:900 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#fecdd3}.v{font:900 17px Arial,Helvetica,sans-serif;fill:#fff}.h{font:800 11px Arial,Helvetica,sans-serif;fill:#fda4af}@keyframes p{0%,100%{opacity:.35}50%{opacity:1}}.p{animation:p 2.4s ease-in-out infinite}</style></defs><rect x="2" y="2" width="356" height="84" rx="20" fill="url(#bg)" stroke="#fb7185" stroke-opacity=".75"/><rect x="18" y="66" width="324" height="4" rx="2" fill="url(#line)"><animate attributeName="opacity" values=".35;1;.35" dur="3s" repeatCount="indefinite"/></rect><circle class="p" cx="43" cy="44" r="18" fill="#ef4444" filter="url(#glow)"/><text x="74" y="33" class="k">GMAIL</text><text x="74" y="55" class="v">puneetsinghania2002@gmail.com</text></svg>