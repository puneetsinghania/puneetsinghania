<svg width="1280" height="500" viewBox="0 0 1280 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="500"><stop stop-color="#F8FAFC"/><stop offset="0.45" stop-color="#E0F2FE"/><stop offset="1" stop-color="#CCFBF1"/></linearGradient>
    <linearGradient id="edge" x1="80" y1="80" x2="1200" y2="450"><stop stop-color="#2563EB"/><stop offset="0.45" stop-color="#0EA5E9"/><stop offset="1" stop-color="#14B8A6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.14"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 38px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}.sub{font:750 15px Inter,Segoe UI,Arial,sans-serif;fill:#475569}.card{font:900 22px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}.body{font:750 14px Inter,Segoe UI,Arial,sans-serif;fill:#334155}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#64748B;letter-spacing:1.5px}@keyframes flow{to{stroke-dashoffset:-220}}@keyframes glowPulse{0%,100%{opacity:.28}50%{opacity:.85}}@keyframes bar{0%,100%{transform:scaleX(.48)}50%{transform:scaleX(1)}}.flow{stroke-dasharray:12 16;animation:flow 5s linear infinite}.glowPulse{animation:glowPulse 3s ease-in-out infinite}.bar{transform-origin:left;animation:bar 3s ease-in-out infinite}</style>
  </defs>
  <rect width="1280" height="500" rx="38" fill="url(#bg)"/>
  <rect x="54" y="56" width="1172" height="386" rx="32" fill="#FFFFFF" opacity="0.78" stroke="#BAE6FD" stroke-width="2" filter="url(#shadow)"/>
  <text class="title" x="86" y="106">Engineering control deck</text><text class="sub" x="86" y="136">Core modules I bring into backend, platform, and infrastructure work</text>
  <path class="flow" d="M232 292H520M640 292H934M376 230V348M784 230V348" stroke="url(#edge)" stroke-width="4" filter="url(#glow)"/>
  <g filter="url(#shadow)"><rect x="88" y="184" width="280" height="136" rx="26" fill="#FFFFFF" stroke="#2563EB"/><text class="micro" x="116" y="218">MODULE A</text><text class="card" x="116" y="256">Core Stack</text><text class="body" x="116" y="286">Java / Spring Boot / Kafka</text><rect x="116" y="302" width="190" height="8" rx="4" fill="#DBEAFE"/><rect class="bar" x="116" y="302" width="190" height="8" rx="4" fill="#2563EB"/></g>
  <g filter="url(#shadow)"><rect x="500" y="184" width="280" height="136" rx="26" fill="#FFFFFF" stroke="#0EA5E9"/><text class="micro" x="528" y="218">MODULE B</text><text class="card" x="528" y="256">Cloud Runtime</text><text class="body" x="528" y="286">OCI / Docker / Kubernetes</text><rect x="528" y="302" width="190" height="8" rx="4" fill="#CFFAFE"/><rect class="bar" style="animation-delay:.35s" x="528" y="302" width="190" height="8" rx="4" fill="#0EA5E9"/></g>
  <g filter="url(#shadow)"><rect x="912" y="184" width="280" height="136" rx="26" fill="#FFFFFF" stroke="#14B8A6"/><text class="micro" x="940" y="218">MODULE C</text><text class="card" x="940" y="256">Data Plane</text><text class="body" x="940" y="286">Redis / SQL / Throughput</text><rect x="940" y="302" width="190" height="8" rx="4" fill="#CCFBF1"/><rect class="bar" style="animation-delay:.7s" x="940" y="302" width="190" height="8" rx="4" fill="#14B8A6"/></g>
  <g filter="url(#shadow)"><rect x="294" y="350" width="280" height="60" rx="22" fill="#FFFFFF" stroke="#7C3AED"/><text class="card" x="324" y="388">Workflow Orchestration</text></g>
  <g filter="url(#shadow)"><rect x="706" y="350" width="280" height="60" rx="22" fill="#FFFFFF" stroke="#F97316"/><text class="card" x="748" y="388">Observability</text></g>
  <circle class="glowPulse" cx="640" cy="292" r="40" fill="#14B8A6" opacity="0.16"/><circle cx="640" cy="292" r="12" fill="#14B8A6" filter="url(#glow)"/>
  <text class="micro" x="86" y="470">NO EDUCATION OR CONTACT MODULES HERE - ENGINEERING ONLY</text>
</svg>
