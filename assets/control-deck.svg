<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560"><stop stop-color="#020617"/><stop offset=".55" stop-color="#0F172A"/><stop offset="1" stop-color="#042F2E"/></linearGradient>
    <linearGradient id="edge" x1="80" y1="80" x2="1200" y2="500"><stop stop-color="#38BDF8"/><stop offset=".45" stop-color="#14B8A6"/><stop offset="1" stop-color="#A3E635"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 38px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.sub{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}.card{font:900 22px Inter,Segoe UI,Arial,sans-serif;fill:#FFFFFF}.body{font:750 14px Inter,Segoe UI,Arial,sans-serif;fill:#BAE6FD}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8;letter-spacing:1.5px}.chip{font:900 13px Inter,Segoe UI,Arial,sans-serif;fill:#E0F2FE}@keyframes flow{to{stroke-dashoffset:-220}}@keyframes glowPulse{0%,100%{opacity:.28}50%{opacity:.85}}@keyframes bar{0%,100%{transform:scaleX(.45)}50%{transform:scaleX(1)}}.flow{stroke-dasharray:12 16;animation:flow 5s linear infinite}.glowPulse{animation:glowPulse 3s ease-in-out infinite}.bar{transform-origin:left;animation:bar 3s ease-in-out infinite}</style>
  </defs>
  <rect width="1280" height="560" rx="38" fill="url(#bg)"/>
  <rect x="52" y="54" width="1176" height="452" rx="32" fill="#020617" opacity=".62" stroke="url(#edge)" stroke-width="2"/>
  <text class="title" x="82" y="100">Control deck</text><text class="sub" x="82" y="130">Expandable profile modules for stack, focus areas, education, and contact</text>
  <path class="flow" d="M228 318H486M640 318H898M356 238V398M768 238V398" stroke="url(#edge)" stroke-width="4" filter="url(#glow)"/>
  <g transform="translate(88 174)"><rect width="280" height="140" rx="26" fill="#0F172A" stroke="#38BDF8"/><text class="micro" x="28" y="34">MODULE A</text><text class="card" x="28" y="72">Core Stack</text><text class="body" x="28" y="102">Java / Spring Boot / Kafka</text><rect x="28" y="118" width="190" height="8" rx="4" fill="#0B2538"/><rect class="bar" x="28" y="118" width="190" height="8" rx="4" fill="#38BDF8"/></g>
  <g transform="translate(500 174)"><rect width="280" height="140" rx="26" fill="#0F172A" stroke="#14B8A6"/><text class="micro" x="28" y="34">MODULE B</text><text class="card" x="28" y="72">Cloud Runtime</text><text class="body" x="28" y="102">OCI / Docker / Kubernetes</text><rect x="28" y="118" width="190" height="8" rx="4" fill="#082F2C"/><rect class="bar" style="animation-delay:.35s" x="28" y="118" width="190" height="8" rx="4" fill="#14B8A6"/></g>
  <g transform="translate(912 174)"><rect width="280" height="140" rx="26" fill="#0F172A" stroke="#A3E635"/><text class="micro" x="28" y="34">MODULE C</text><text class="card" x="28" y="72">Data Plane</text><text class="body" x="28" y="102">Redis / SQL / Throughput</text><rect x="28" y="118" width="190" height="8" rx="4" fill="#1A2E05"/><rect class="bar" style="animation-delay:.7s" x="28" y="118" width="190" height="8" rx="4" fill="#A3E635"/></g>
  <g transform="translate(294 356)"><rect width="280" height="110" rx="24" fill="#0F172A" stroke="#A78BFA"/><text class="micro" x="28" y="34">MODULE D</text><text class="card" x="28" y="72">Education</text><text class="body" x="28" y="96">MS CS / UC Riverside</text></g>
  <g transform="translate(706 356)"><rect width="280" height="110" rx="24" fill="#0F172A" stroke="#F97316"/><text class="micro" x="28" y="34">MODULE E</text><text class="card" x="28" y="72">Contact</text><text class="body" x="28" y="96">LinkedIn / Email / GitHub</text></g>
  <circle class="glowPulse" cx="640" cy="318" r="44" fill="#14B8A6" opacity=".18"/><circle cx="640" cy="318" r="14" fill="#22C55E" filter="url(#glow)"/>
  <text class="micro" x="82" y="530">INTERACTION MODEL: OPEN MODULES, CLICK LINKS, SCAN VISUAL SYSTEM</text>
</svg>
