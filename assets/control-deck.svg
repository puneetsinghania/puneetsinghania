<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520"><stop stop-color="#020617"/><stop offset="0.55" stop-color="#0F172A"/><stop offset="1" stop-color="#042F2E"/></linearGradient>
    <linearGradient id="edge" x1="80" y1="80" x2="1200" y2="470"><stop stop-color="#38BDF8"/><stop offset="0.45" stop-color="#14B8A6"/><stop offset="1" stop-color="#A3E635"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 38px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.sub{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}.card{font:900 22px Inter,Segoe UI,Arial,sans-serif;fill:#FFFFFF}.body{font:750 14px Inter,Segoe UI,Arial,sans-serif;fill:#BAE6FD}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8;letter-spacing:1.5px}@keyframes flow{to{stroke-dashoffset:-220}}@keyframes glowPulse{0%,100%{opacity:.28}50%{opacity:.85}}@keyframes bar{0%,100%{transform:scaleX(.48)}50%{transform:scaleX(1)}}.flow{stroke-dasharray:12 16;animation:flow 5s linear infinite}.glowPulse{animation:glowPulse 3s ease-in-out infinite}.bar{transform-origin:left;animation:bar 3s ease-in-out infinite}</style>
  </defs>
  <rect width="1280" height="520" rx="38" fill="url(#bg)"/>
  <rect x="54" y="56" width="1172" height="408" rx="32" fill="#020617" opacity="0.62" stroke="url(#edge)" stroke-width="2"/>
  <text class="title" x="86" y="106">Engineering control deck</text><text class="sub" x="86" y="136">Core modules I bring into backend, platform, and infrastructure work</text>
  <path class="flow" d="M232 304H520M640 304H934M376 238V370M784 238V370" stroke="url(#edge)" stroke-width="4" filter="url(#glow)"/>
  <g><rect x="88" y="190" width="280" height="140" rx="26" fill="#0F172A" stroke="#38BDF8"/><text class="micro" x="116" y="224">MODULE A</text><text class="card" x="116" y="262">Core Stack</text><text class="body" x="116" y="292">Java / Spring Boot / Kafka</text><rect x="116" y="308" width="190" height="8" rx="4" fill="#0B2538"/><rect class="bar" x="116" y="308" width="190" height="8" rx="4" fill="#38BDF8"/></g>
  <g><rect x="500" y="190" width="280" height="140" rx="26" fill="#0F172A" stroke="#14B8A6"/><text class="micro" x="528" y="224">MODULE B</text><text class="card" x="528" y="262">Cloud Runtime</text><text class="body" x="528" y="292">OCI / Docker / Kubernetes</text><rect x="528" y="308" width="190" height="8" rx="4" fill="#082F2C"/><rect class="bar" style="animation-delay:.35s" x="528" y="308" width="190" height="8" rx="4" fill="#14B8A6"/></g>
  <g><rect x="912" y="190" width="280" height="140" rx="26" fill="#0F172A" stroke="#A3E635"/><text class="micro" x="940" y="224">MODULE C</text><text class="card" x="940" y="262">Data Plane</text><text class="body" x="940" y="292">Redis / SQL / Throughput</text><rect x="940" y="308" width="190" height="8" rx="4" fill="#1A2E05"/><rect class="bar" style="animation-delay:.7s" x="940" y="308" width="190" height="8" rx="4" fill="#A3E635"/></g>
  <g><rect x="294" y="360" width="280" height="76" rx="24" fill="#0F172A" stroke="#A78BFA"/><text class="card" x="324" y="406">Workflow Orchestration</text></g>
  <g><rect x="706" y="360" width="280" height="76" rx="24" fill="#0F172A" stroke="#F97316"/><text class="card" x="748" y="406">Observability</text></g>
  <circle class="glowPulse" cx="640" cy="304" r="44" fill="#14B8A6" opacity="0.18"/><circle cx="640" cy="304" r="14" fill="#22C55E" filter="url(#glow)"/>
  <text class="micro" x="86" y="492">CONTROL SURFACE: SERVICE DESIGN / INFRASTRUCTURE AUTOMATION / RELIABILITY / SCALE</text>
</svg>
