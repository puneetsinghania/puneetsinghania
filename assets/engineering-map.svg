<svg width="1200" height="660" viewBox="0 0 1200 660" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="660"><stop stop-color="#020617"/><stop offset=".52" stop-color="#0B1120"/><stop offset="1" stop-color="#082F49"/></linearGradient>
    <linearGradient id="wire" x1="90" y1="120" x2="1110" y2="560"><stop stop-color="#38BDF8"/><stop offset=".42" stop-color="#14B8A6"/><stop offset=".73" stop-color="#22C55E"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 36px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.sub{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}.node{font:900 20px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.nodeSub{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#BAE6FD}.chip{font:800 12px Inter,Segoe UI,Arial,sans-serif;fill:#E0F2FE}.tiny{font:800 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8;letter-spacing:1px}@keyframes packet{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-220}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}@keyframes spin{to{transform:rotate(360deg)}}.wire{stroke-dasharray:12 18;animation:packet 5s linear infinite}.pulse{animation:pulse 2.8s ease-in-out infinite}.spin{transform-origin:600px 350px;animation:spin 26s linear infinite}</style>
  </defs>
  <rect width="1200" height="660" rx="36" fill="url(#bg)"/>
  <g opacity=".12"><path d="M80 140H1120M80 220H1120M80 300H1120M80 380H1120M80 460H1120M80 540H1120" stroke="#94A3B8"/><path d="M160 90V590M280 90V590M400 90V590M520 90V590M640 90V590M760 90V590M880 90V590M1000 90V590" stroke="#94A3B8"/></g>
  <text class="title" x="62" y="72">Architecture map</text><text class="sub" x="62" y="102">A visual model of the systems surface I work across</text>
  <circle class="spin" cx="600" cy="350" r="178" stroke="url(#wire)" stroke-width="2" stroke-dasharray="4 16" opacity=".72"/>
  <circle class="spin" cx="600" cy="350" r="118" stroke="#38BDF8" stroke-width="2" stroke-dasharray="3 14" opacity=".48"/>
  <path class="wire" d="M600 350L224 198M600 350L976 198M600 350L224 498M600 350L976 498M600 350V554" stroke="url(#wire)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <g transform="translate(474 226)"><rect width="252" height="252" rx="36" fill="#020617" stroke="url(#wire)" stroke-width="3"/><circle class="pulse" cx="126" cy="108" r="58" fill="#0EA5E9" opacity=".18"/><text class="node" x="60" y="100">Platform</text><text class="node" x="70" y="128">Core</text><text class="nodeSub" x="52" y="162">reliability + scale</text><rect x="54" y="184" width="144" height="30" rx="15" fill="#0F766E"/><text class="chip" x="82" y="204">production calm</text></g>
  <g transform="translate(72 142)"><rect width="304" height="142" rx="26" fill="#0F172A" stroke="#38BDF8"/><text class="tiny" x="28" y="34">LAYER 01</text><text class="node" x="28" y="70">Backend APIs</text><text class="nodeSub" x="28" y="98">service boundaries, contracts, Java</text><rect x="28" y="112" width="66" height="22" rx="11" fill="#075985"/><text class="chip" x="48" y="128">Java</text><rect x="104" y="112" width="86" height="22" rx="11" fill="#075985"/><text class="chip" x="120" y="128">Spring</text></g>
  <g transform="translate(824 142)"><rect width="304" height="142" rx="26" fill="#0F172A" stroke="#14B8A6"/><text class="tiny" x="28" y="34">LAYER 02</text><text class="node" x="28" y="70">Workflow Engine</text><text class="nodeSub" x="28" y="98">orchestration, retries, isolation</text><rect x="28" y="112" width="78" height="22" rx="11" fill="#0F766E"/><text class="chip" x="46" y="128">Kafka</text><rect x="116" y="112" width="82" height="22" rx="11" fill="#0F766E"/><text class="chip" x="132" y="128">Async</text></g>
  <g transform="translate(72 442)"><rect width="304" height="142" rx="26" fill="#0F172A" stroke="#22C55E"/><text class="tiny" x="28" y="34">LAYER 03</text><text class="node" x="28" y="70">Cloud Runtime</text><text class="nodeSub" x="28" y="98">containers, infra automation, Linux</text><rect x="28" y="112" width="80" height="22" rx="11" fill="#15803D"/><text class="chip" x="44" y="128">Docker</text><rect x="118" y="112" width="66" height="22" rx="11" fill="#15803D"/><text class="chip" x="140" y="128">K8s</text></g>
  <g transform="translate(824 442)"><rect width="304" height="142" rx="26" fill="#0F172A" stroke="#A78BFA"/><text class="tiny" x="28" y="34">LAYER 04</text><text class="node" x="28" y="70">Data Plane</text><text class="nodeSub" x="28" y="98">cache, SQL, throughput, latency</text><rect x="28" y="112" width="74" height="22" rx="11" fill="#6D28D9"/><text class="chip" x="46" y="128">Redis</text><rect x="112" y="112" width="60" height="22" rx="11" fill="#6D28D9"/><text class="chip" x="134" y="128">SQL</text></g>
  <g transform="translate(464 524)"><rect width="272" height="76" rx="24" fill="#0F172A" stroke="#F59E0B"/><text class="node" x="58" y="34">Observability</text><text class="nodeSub" x="48" y="58">metrics, traces, ownership</text></g>
</svg>
