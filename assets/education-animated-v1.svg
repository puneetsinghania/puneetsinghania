<svg width="1060" height="330" viewBox="0 0 1060 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated education section</title>
  <desc id="desc">Animated academic section with UC Riverside and National Institute of Engineering.</desc>
  <defs>
    <linearGradient id="outer" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#ecfeff"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0b2538"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset="0.5" stop-color="#14b8a6"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.22"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.title{font:900 32px Arial,Helvetica,sans-serif;fill:#f8fafc}.sub{font:700 13px Arial,Helvetica,sans-serif;fill:#bfdbfe}.school{font:900 23px Arial,Helvetica,sans-serif;fill:#f8fafc}.degree{font:800 14px Arial,Helvetica,sans-serif;fill:#dbeafe}.place{font:800 11px Arial,Helvetica,sans-serif;letter-spacing:1.5px;fill:#7dd3fc}.chip{font:900 10px Arial,Helvetica,sans-serif;letter-spacing:1px;fill:#0f172a}.card{transition:transform .25s ease}.card:hover{transform:translateY(-5px)}@keyframes scan{0%{transform:translateX(-220px);opacity:.08}45%{opacity:.45}100%{transform:translateX(720px);opacity:.08}}.scanner{animation:scan 5s linear infinite}</style>
  </defs>
  <rect width="1060" height="330" rx="30" fill="url(#outer)"/>
  <path d="M0 248 C174 204 334 274 516 218 C690 166 800 236 1060 178 L1060 330 L0 330 Z" fill="#38bdf8" opacity="0.13"/>
  <g filter="url(#shadow)"><rect x="52" y="42" width="956" height="246" rx="28" fill="#020617"/><rect x="78" y="68" width="904" height="174" rx="22" fill="url(#screen)" stroke="#38bdf8" stroke-opacity="0.33"/></g>
  <rect class="scanner" x="160" y="58" width="190" height="190" rx="95" fill="#22d3ee" opacity="0.1"/>
  <g transform="translate(106 94)"><text class="title" x="0" y="0">Education</text><text class="sub" x="0" y="28">Academic foundation in computer science, systems, algorithms, security, and distributed computing</text></g>
  <g class="card" transform="translate(106 148)"><rect width="384" height="98" rx="20" fill="#0f172a" stroke="#60a5fa" stroke-opacity="0.78"/><circle cx="48" cy="49" r="30" fill="#2563eb" filter="url(#glow)"><animate attributeName="r" values="27;32;27" dur="3s" repeatCount="indefinite"/></circle><text x="37" y="58" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#fff">U</text><text class="school" x="96" y="39">UC Riverside</text><text class="degree" x="96" y="63">M.S. Computer Science</text><text class="place" x="96" y="83">RIVERSIDE, CALIFORNIA</text></g>
  <g class="card" transform="translate(570 148)"><rect width="384" height="98" rx="20" fill="#0f172a" stroke="#2dd4bf" stroke-opacity="0.78"/><circle cx="48" cy="49" r="30" fill="#14b8a6" filter="url(#glow)"><animate attributeName="r" values="27;32;27" dur="3.4s" repeatCount="indefinite"/></circle><text x="37" y="58" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#fff">N</text><text class="school" x="96" y="34">National Institute</text><text class="school" x="96" y="58" font-size="21">of Engineering</text><text class="degree" x="96" y="80">B.E. Information Science</text></g>
  <path d="M106 270 L954 270" stroke="url(#line)" stroke-width="5" stroke-linecap="round" opacity="0.7"><animate attributeName="opacity" values="0.35;0.85;0.35" dur="4s" repeatCount="indefinite"/></path>
  <g transform="translate(145 286)"><rect width="138" height="22" rx="11" fill="#bfdbfe"/><text class="chip" x="21" y="15">DISTRIBUTED COMP</text></g><g transform="translate(316 286)"><rect width="112" height="22" rx="11" fill="#ccfbf1"/><text class="chip" x="25" y="15">ALGORITHMS</text></g><g transform="translate(462 286)"><rect width="92" height="22" rx="11" fill="#e0e7ff"/><text class="chip" x="34" y="15">AI</text></g><g transform="translate(588 286)"><rect width="102" height="22" rx="11" fill="#fed7aa"/><text class="chip" x="26" y="15">SECURITY</text></g><g transform="translate(724 286)"><rect width="126" height="22" rx="11" fill="#bae6fd"/><text class="chip" x="24" y="15">BIG DATA</text></g>
</svg>
