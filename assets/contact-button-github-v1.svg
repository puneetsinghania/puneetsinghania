<svg width="300" height="88" viewBox="0 0 300 88" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">GitHub contact button</title><desc id="desc">Clickable GitHub button for Puneet Singhania.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#1e1b4b"/></linearGradient><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#f8fafc"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.k{font:900 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#ddd6fe}.v{font:900 19px Arial,Helvetica,sans-serif;fill:#fff}@keyframes p{0%,100%{opacity:.35}50%{opacity:1}}.p{animation:p 2.8s ease-in-out infinite}</style></defs><rect x="2" y="2" width="296" height="84" rx="20" fill="url(#bg)" stroke="#a78bfa" stroke-opacity=".75"/><rect x="18" y="66" width="264" height="4" rx="2" fill="url(#line)"><animate attributeName="opacity" values=".35;1;.35" dur="3.4s" repeatCount="indefinite"/></rect><circle class="p" cx="43" cy="44" r="18" fill="#a78bfa" filter="url(#glow)"/><text x="34" y="52" font-family="Arial" font-size="24" font-weight="900" fill="#111827">G</text><text x="74" y="33" class="k">GITHUB</text><text x="74" y="56" class="v">puneetsinghania</text></svg>