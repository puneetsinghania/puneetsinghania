<svg width="240" height="88" viewBox="0 0 240 88" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Location badge</title><desc id="desc">San Francisco Bay Area location badge.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#064e3b"/></linearGradient><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.k{font:900 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#a7f3d0}.v{font:900 18px Arial,Helvetica,sans-serif;fill:#fff}@keyframes p{0%,100%{opacity:.35}50%{opacity:1}}.p{animation:p 3s ease-in-out infinite}</style></defs><rect x="2" y="2" width="236" height="84" rx="20" fill="url(#bg)" stroke="#34d399" stroke-opacity=".75"/><rect x="18" y="66" width="204" height="4" rx="2" fill="url(#line)"><animate attributeName="opacity" values=".35;1;.35" dur="3.6s" repeatCount="indefinite"/></rect><circle class="p" cx="43" cy="44" r="18" fill="#34d399" filter="url(#glow)"/><text x="36" y="52" font-family="Arial" font-size="22" font-weight="900" fill="#064e3b">⌖</text><text x="74" y="33" class="k">LOCATION</text><text x="74" y="56" class="v">Bay Area</text></svg>