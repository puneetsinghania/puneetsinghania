      @keyframes scan{0%{x:-240;opacity:0}20%,65%{opacity:.32}100%{x:1320;opacity:0}}@keyframes glowPulse{0%,100%{opacity:.45}50%{opacity:1}}.scan{animation:scan 5.8s ease-in-out infinite}.pulse{animation:glowPulse 2.7s ease-in-out infinite}
    </style>
