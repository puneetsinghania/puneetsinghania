    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1280" y2="620">
      <stop stop-color="#0EA5E9"/><stop offset="0.48" stop-color="#14B8A6"/><stop offset="1" stop-color="#A78BFA"/>
