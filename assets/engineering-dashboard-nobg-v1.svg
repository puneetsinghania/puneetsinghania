<svg width="1060" height="380" viewBox="0 0 1060 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Engineering dashboard without wrapper</title><desc id="desc">Animated engineering dashboard on a transparent background.</desc><defs><linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset=".62" stop-color="#071a2e"/><stop offset="1" stop-color="#042f3f"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset=".52" stop-color="#60a5fa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient><radialGradient id="orb" cx="50%" cy="50%" r="55%"><stop offset="0" stop-color="#22d3ee" stop-opacity=".5"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient><filter id="shadow" x="-20%" y="-25%" width="140%" height="155%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity=".34"/></filter><filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:900 34px Arial,Helvetica,sans-serif;fill:#f8fafc}.sub{font:700 13px Arial,Helvetica,sans-serif;fill:#bae6fd}.kicker{font:800 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#67e8f9}.metric{font:900 20px Arial,Helvetica,sans-serif;fill:#f8fafc}.small{font:700 12px Arial,Helvetica,sans-serif;fill:#cbd5e1}.tag{font:900 10px Arial,Helvetica,sans-serif;letter-spacing:1px;fill:#08111f}@keyframes scan{0%{transform:translateX(-240px);opacity:.08}45%{opacity:.5}100%{transform:translateX(760px);opacity:.08}}.scanner{animation:scan 4.6s linear infinite}</style></defs><g filter="url(#shadow)"><rect x="50" y="34" width="960" height="304" rx="30" fill="#020617"/><rect x="76" y="62" width="908" height="228" rx="22" fill="url(#screen)" stroke="#38bdf8" stroke-opacity=".35"><animate attributeName="stroke-opacity" values=".25;.75;.25" dur="4s" repeatCount="indefinite"/></rect><circle cx="530" cy="48" r="4" fill="#dbeafe" opacity=".76"/></g><circle cx="470" cy="196" r="98" fill="url(#orb)"><animate attributeName="r" values="78;104;78" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".5;.9;.5" dur="5s" repeatCount="indefinite"/></circle><rect class="scanner" x="154" y="88" width="192" height="188" rx="94" fill="#22d3ee" opacity=".1"/><g transform="translate(108 95)"><text class="kicker" x="0" y="0">ENGINEERING DASHBOARD</text><text class="title" x="0" y="42">Systems I Build Around</text><text class="sub" x="0" y="68">Backend services, cloud runtime, distributed messaging, data performance, reliability</text></g><g transform="translate(106 180)"><rect width="194" height="116" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity=".7"/><circle cx="166" cy="28" r="8" fill="#67e8f9" filter="url(#glow)"><animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/></circle><text class="kicker" x="20" y="28">CORE SERVICES</text><text class="metric" x="20" y="60">Java + Spring</text><text class="small" x="20" y="82">Backend APIs</text><rect x="20" y="92" width="120" height="18" rx="9" fill="#67e8f9"/><text class="tag" x="42" y="105">SERVICE XP</text></g><g transform="translate(324 180)"><rect width="194" height="116" rx="18" fill="#111827" stroke="#60a5fa" stroke-opacity=".72"/><circle cx="166" cy="28" r="8" fill="#93c5fd" filter="url(#glow)"><animate attributeName="opacity" values=".35;1;.35" dur="2.7s" repeatCount="indefinite"/></circle><text class="kicker" x="20" y="28">DISTRIBUTED</text><text class="metric" x="20" y="60">Kafka</text><text class="small" x="20" y="82">Messaging + workflows</text><rect x="20" y="92" width="126" height="18" rx="9" fill="#93c5fd"/><text class="tag" x="43" y="105">EVENT FLOW</text></g><g transform="translate(542 180)"><rect width="194" height="116" rx="18" fill="#0b1f3a" stroke="#34d399" stroke-opacity=".72"/><circle cx="166" cy="28" r="8" fill="#5eead4" filter="url(#glow)"><animate attributeName="opacity" values=".35;1;.35" dur="3s" repeatCount="indefinite"/></circle><text class="kicker" x="20" y="28">CLOUD RUNTIME</text><text class="metric" x="20" y="60">OCI + K8s</text><text class="small" x="20" y="82">Containers + scale</text><rect x="20" y="92" width="118" height="18" rx="9" fill="#5eead4"/><text class="tag" x="45" y="105">CLOUD OPS</text></g><g transform="translate(760 180)"><rect width="194" height="116" rx="18" fill="#1e1b4b" stroke="#a78bfa" stroke-opacity=".72"/><circle cx="166" cy="28" r="8" fill="#c4b5fd" filter="url(#glow)"><animate attributeName="opacity" values=".35;1;.35" dur="3.3s" repeatCount="indefinite"/></circle><text class="kicker" x="20" y="28">DATA PLANE</text><text class="metric" x="20" y="60">SQL + Redis</text><text class="small" x="20" y="82">Performance systems</text><rect x="20" y="92" width="124" height="18" rx="9" fill="#c4b5fd"/><text class="tag" x="44" y="105">LOW LATENCY</text></g><path d="M106 324 L954 324" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity=".62"><animate attributeName="opacity" values=".35;.88;.35" dur="3.6s" repeatCount="indefinite"/></path></svg>