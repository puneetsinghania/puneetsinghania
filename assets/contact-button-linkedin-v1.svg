<svg width="330" height="88" viewBox="0 0 330 88" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">LinkedIn contact button</title><desc id="desc">Clickable LinkedIn button for Puneet Singhania.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#082f49"/></linearGradient><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#0a66c2"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.k{font:900 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#bae6fd}.v{font:900 20px Arial,Helvetica,sans-serif;fill:#fff}.h{font:800 11px Arial,Helvetica,sans-serif;fill:#7dd3fc}@keyframes p{0%,100%{opacity:.35}50%{opacity:1}}.p{animation:p 2.6s ease-in-out infinite}</style></defs><rect x="2" y="2" width="326" height="84" rx="20" fill="url(#bg)" stroke="#38bdf8" stroke-opacity=".75"/><rect x="18" y="66" width="294" height="4" rx="2" fill="url(#line)"><animate attributeName="opacity" values=".35;1;.35" dur="3.2s" repeatCount="indefinite"/></rect><circle class="p" cx="43" cy="44" r="18" fill="#0a66c2" filter="url(#glow)"/><text x="35" y="51" font-family="Arial" font-size="22" font-weight="900" fill="#fff">in</text><text x="74" y="33" class="k">LINKEDIN</text><text x="74" y="56" class="v">Puneet Singhania</text></svg>