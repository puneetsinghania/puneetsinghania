    <style>.title{font:900 34px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.sub{font:750 15px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}.card{font:900 22px Inter,Segoe UI,Arial,sans-serif;fill:#FFFFFF}.body{font:780 14px Inter,Segoe UI,Arial,sans-serif;fill:#BAE6FD}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8;letter-spacing:1.5px}@keyframes dash{to{stroke-dashoffset:-180}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}.dash{stroke-dasharray:12 14;animation:dash 5s linear infinite}.pulse{animation:pulse 2.6s ease-in-out infinite}</style>
  </defs>
