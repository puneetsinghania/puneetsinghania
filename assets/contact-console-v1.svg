<svg width="1060" height="330" viewBox="0 0 1060 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contact console</title>
  <desc id="desc">Animated contact console for Puneet Singhania with email, LinkedIn, GitHub, and location.</desc>
  <defs>
    <linearGradient id="outer" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0f7ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06111f"/><stop offset="0.6" stop-color="#071a2e"/><stop offset="1" stop-color="#042f3f"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="0.42" stop-color="#60a5fa"/><stop offset="0.72" stop-color="#a78bfa"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="55%"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.48"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="155%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.28"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .title{font:900 34px Arial, Helvetica, sans-serif;fill:#f8fafc}.sub{font:700 13px Arial, Helvetica, sans-serif;fill:#bae6fd}.kicker{font:800 11px Arial, Helvetica, sans-serif;letter-spacing:1.6px;fill:#67e8f9}.label{font:900 12px Arial, Helvetica, sans-serif;letter-spacing:1.2px;fill:#67e8f9}.value{font:900 18px Arial, Helvetica, sans-serif;fill:#f8fafc}.hint{font:800 11px Arial, Helvetica, sans-serif;fill:#cbd5e1}.card{transition:transform .25s ease}.card:hover{transform:translateY(-5px)}@keyframes scan{0%{transform:translateX(-220px);opacity:.08}45%{opacity:.5}100%{transform:translateX(720px);opacity:.08}}.scanner{animation:scan 5s linear infinite}@keyframes breathe{0%,100%{opacity:.28}50%{opacity:.72}}.breathe{animation:breathe 3.2s ease-in-out infinite}.breathe2{animation:breathe 3.8s ease-in-out .7s infinite}
    </style>
  </defs>
  <rect width="1060" height="330" rx="34" fill="url(#outer)"/>
  <path d="M0 244 C174 196 326 270 500 216 C674 162 814 238 1060 176 L1060 330 L0 330 Z" fill="#38bdf8" opacity="0.14"/>
  <g filter="url(#shadow)">
    <rect x="50" y="42" width="960" height="246" rx="30" fill="#020617"/>
    <rect x="76" y="68" width="908" height="174" rx="22" fill="url(#screen)" stroke="#38bdf8" stroke-opacity="0.35"/>
    <circle cx="530" cy="56" r="4" fill="#dbeafe" opacity="0.76"/>
  </g>
  <circle class="breathe" cx="806" cy="148" r="86" fill="url(#orb)"/>
  <circle class="breathe2" cx="318" cy="206" r="70" fill="url(#orb)"/>
  <rect class="scanner" x="150" y="82" width="190" height="190" rx="95" fill="#22d3ee" opacity="0.1"/>
  <g transform="translate(106 96)">
    <text class="kicker" x="0" y="0">CONTACT CONSOLE</text>
    <text class="title" x="0" y="42">Let's Connect</text>
    <text class="sub" x="0" y="68">Backend systems, cloud infrastructure, distributed workflows, and engineering conversations</text>
  </g>
  <g class="card" transform="translate(106 178)">
    <rect width="226" height="72" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.76"/>
    <circle cx="28" cy="36" r="13" fill="#38bdf8" filter="url(#glow)"><animate attributeName="r" values="11;15;11" dur="2.8s" repeatCount="indefinite"/></circle>
    <text class="label" x="54" y="29">GMAIL</text>
    <text class="hint" x="54" y="51">puneetsinghania2002@gmail.com</text>
  </g>
  <g class="card" transform="translate(354 178)">
    <rect width="202" height="72" rx="18" fill="#0b1f3a" stroke="#60a5fa" stroke-opacity="0.76"/>
    <circle cx="28" cy="36" r="13" fill="#60a5fa" filter="url(#glow)"><animate attributeName="r" values="11;15;11" dur="3.1s" repeatCount="indefinite"/></circle>
    <text class="label" x="54" y="29">LINKEDIN</text>
    <text class="value" x="54" y="53">Puneet Singhania</text>
  </g>
  <g class="card" transform="translate(578 178)">
    <rect width="176" height="72" rx="18" fill="#111827" stroke="#a78bfa" stroke-opacity="0.76"/>
    <circle cx="28" cy="36" r="13" fill="#a78bfa" filter="url(#glow)"><animate attributeName="r" values="11;15;11" dur="3.4s" repeatCount="indefinite"/></circle>
    <text class="label" x="54" y="29">GITHUB</text>
    <text class="value" x="54" y="53">puneetsinghania</text>
  </g>
  <g class="card" transform="translate(776 178)">
    <rect width="178" height="72" rx="18" fill="#1e1b4b" stroke="#fb7185" stroke-opacity="0.76"/>
    <circle cx="28" cy="36" r="13" fill="#fb7185" filter="url(#glow)"><animate attributeName="r" values="11;15;11" dur="3.7s" repeatCount="indefinite"/></circle>
    <text class="label" x="54" y="29">LOCATION</text>
    <text class="value" x="54" y="53">Bay Area</text>
  </g>
  <path d="M106 268 L954 268" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.62">
    <animate attributeName="opacity" values="0.35;0.85;0.35" dur="3.8s" repeatCount="indefinite"/>
  </path>
</svg>
