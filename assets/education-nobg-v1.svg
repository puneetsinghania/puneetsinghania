<svg width="1060" height="310" viewBox="0 0 1060 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Education without wrapper</title><desc id="desc">Animated academic section on transparent background.</desc><defs><linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#0b2538"/></linearGradient><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2563eb"/><stop offset=".5" stop-color="#14b8a6"/><stop offset="1" stop-color="#f97316"/></linearGradient><filter id="shadow" x="-20%" y="-25%" width="140%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".28"/></filter><filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:900 32px Arial,Helvetica,sans-serif;fill:#f8fafc}.sub{font:700 13px Arial,Helvetica,sans-serif;fill:#bfdbfe}.school{font:900 23px Arial,Helvetica,sans-serif;fill:#f8fafc}.degree{font:800 14px Arial,Helvetica,sans-serif;fill:#dbeafe}.place{font:800 11px Arial,Helvetica,sans-serif;letter-spacing:1.5px;fill:#7dd3fc}.chip{font:900 10px Arial,Helvetica,sans-serif;letter-spacing:1px;fill:#0f172a}@keyframes scan{0%{transform:translateX(-220px);opacity:.08}45%{opacity:.45}100%{transform:translateX(720px);opacity:.08}}.scanner{animation:scan 5s linear infinite}</style></defs><g filter="url(#shadow)"><rect x="52" y="34" width="956" height="236" rx="28" fill="#020617"/><rect x="78" y="60" width="904" height="174" rx="22" fill="url(#screen)" stroke="#38bdf8" stroke-opacity=".33"><animate attributeName="stroke-opacity" values=".22;.65;.22" dur="4s" repeatCount="indefinite"/></rect></g><rect class="scanner" x="160" y="50" width="190" height="190" rx="95" fill="#22d3ee" opacity=".1"/><g transform="translate(106 86)"><text class="title" x="0" y="0">Education</text><text class="sub" x="0" y="28">Academic foundation in computer science, systems, algorithms, security, and distributed computing</text></g><g transform="translate(106 140)"><rect width="384" height="98" rx="20" fill="#0f172a" stroke="#60a5fa" stroke-opacity=".78"/><circle cx="48" cy="49" r="30" fill="#2563eb" filter="url(#glow)"><animate attributeName="r" values="27;32;27" dur="3s" repeatCount="indefinite"/></circle><text x="37" y="58" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#fff">U</text><text class="school" x="96" y="39">UC Riverside</text><text class="degree" x="96" y="63">M.S. Computer Science</text><text class="place" x="96" y="83">RIVERSIDE, CALIFORNIA</text></g><g transform="translate(570 140)"><rect width="384" height="98" rx="20" fill="#0f172a" stroke="#2dd4bf" stroke-opacity=".78"/><circle cx="48" cy="49" r="30" fill="#14b8a6" filter="url(#glow)"><animate attributeName="r" values="27;32;27" dur="3.4s" repeatCount="indefinite"/></circle><text x="37" y="58" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#fff">N</text><text class="school" x="96" y="34">National Institute</text><text class="school" x="96" y="58" font-size="21">of Engineering</text><text class="degree" x="96" y="80">B.E. Information Science</text></g><path d="M106 270 L954 270" stroke="url(#line)" stroke-width="5" stroke-linecap="round" opacity=".7"><animate attributeName="opacity" values=".35;.85;.35" dur="4s" repeatCount="indefinite"/></path></svg>