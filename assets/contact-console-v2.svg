<svg width="1060" height="350" viewBox="0 0 1060 350" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Profile links contact console</title><desc id="desc">Animated contact console introducing clickable profile links below.</desc><defs><linearGradient id="outer" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e0f7ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient><linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset=".6" stop-color="#071a2e"/><stop offset="1" stop-color="#042f3f"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset=".42" stop-color="#60a5fa"/><stop offset=".72" stop-color="#a78bfa"/><stop offset="1" stop-color="#fb7185"/></linearGradient><radialGradient id="orb" cx="50%" cy="50%" r="55%"><stop offset="0" stop-color="#22d3ee" stop-opacity=".48"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient><filter id="shadow" x="-20%" y="-25%" width="140%" height="155%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity=".28"/></filter><filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:900 36px Arial,Helvetica,sans-serif;fill:#f8fafc}.sub{font:700 13px Arial,Helvetica,sans-serif;fill:#bae6fd}.kicker{font:800 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#67e8f9}.label{font:900 12px Arial,Helvetica,sans-serif;letter-spacing:1.2px;fill:#67e8f9}.value{font:900 20px Arial,Helvetica,sans-serif;fill:#f8fafc}.hint{font:800 12px Arial,Helvetica,sans-serif;fill:#cbd5e1}@keyframes scan{0%{transform:translateX(-220px);opacity:.08}45%{opacity:.5}100%{transform:translateX(720px);opacity:.08}}.scanner{animation:scan 4.4s linear infinite}@keyframes breathe{0%,100%{opacity:.25}50%{opacity:.75}}.breathe{animation:breathe 3.2s ease-in-out infinite}.breathe2{animation:breathe 3.8s ease-in-out .7s infinite}</style></defs><rect width="1060" height="350" rx="34" fill="url(#outer)"/><path d="M0 260 C174 210 326 284 500 230 C674 176 814 252 1060 190 L1060 350 L0 350 Z" fill="#38bdf8" opacity=".14"/><g filter="url(#shadow)"><rect x="50" y="42" width="960" height="266" rx="30" fill="#020617"/><rect x="76" y="68" width="908" height="194" rx="22" fill="url(#screen)" stroke="#38bdf8" stroke-opacity=".35"><animate attributeName="stroke-opacity" values=".25;.75;.25" dur="4s" repeatCount="indefinite"/></rect><circle cx="530" cy="56" r="4" fill="#dbeafe" opacity=".76"/></g><circle class="breathe" cx="806" cy="148" r="86" fill="url(#orb)"/><circle class="breathe2" cx="318" cy="210" r="70" fill="url(#orb)"/><rect class="scanner" x="150" y="82" width="190" height="190" rx="95" fill="#22d3ee" opacity=".1"/><g transform="translate(106 98)"><text class="kicker" x="0" y="0">CONTACT CONSOLE</text><text class="title" x="0" y="45">Let's Connect</text><text class="sub" x="0" y="72">Use the live profile buttons below for Gmail, LinkedIn, GitHub, and location.</text></g><g transform="translate(108 192)"><rect width="844" height="52" rx="26" fill="#0f172a" stroke="url(#accent)" stroke-opacity=".8"/><circle cx="34" cy="26" r="10" fill="#22d3ee" filter="url(#glow)"><animate attributeName="r" values="8;13;8" dur="2.5s" repeatCount="indefinite"/></circle><text class="label" x="58" y="22">PROFILE PORTALS</text><text class="value" x="58" y="41">Gmail • LinkedIn • GitHub • Bay Area</text><path d="M570 26H804" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="12 14"><animate attributeName="stroke-dashoffset" values="0;-120" dur="3.6s" repeatCount="indefinite"/></path></g><path d="M106 284 L954 284" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity=".62"><animate attributeName="opacity" values=".35;.9;.35" dur="3.4s" repeatCount="indefinite"/></path></svg>