<svg width="1280" height="700" viewBox="0 0 1280 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="700"><stop stop-color="#020617"/><stop offset=".50" stop-color="#0B1120"/><stop offset="1" stop-color="#082F49"/></linearGradient>
    <linearGradient id="wire" x1="105" y1="130" x2="1170" y2="590"><stop stop-color="#38BDF8"/><stop offset=".35" stop-color="#14B8A6"/><stop offset=".70" stop-color="#22C55E"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 38px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.sub{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}.node{font:900 21px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.nodeSub{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#BAE6FD}.chip{font:850 12px Inter,Segoe UI,Arial,sans-serif;fill:#E0F2FE}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8;letter-spacing:1.6px}@keyframes move{to{stroke-dashoffset:-240}}@keyframes pulse{0%,100%{opacity:.28}50%{opacity:1}}@keyframes rotate{to{transform:rotate(360deg)}}.wire{stroke-dasharray:12 16;animation:move 5s linear infinite}.pulse{animation:pulse 2.6s ease-in-out infinite}.rotate{transform-origin:640px 376px;animation:rotate 32s linear infinite}</style>
  </defs>
  <rect width="1280" height="700" rx="38" fill="url(#bg)"/>
  <g opacity=".10"><path d="M80 142H1200M80 230H1200M80 318H1200M80 406H1200M80 494H1200M80 582H1200" stroke="#94A3B8"/><path d="M160 80V620M300 80V620M440 80V620M580 80V620M720 80V620M860 80V620M1000 80V620M1140 80V620" stroke="#94A3B8"/></g>
  <rect x="52" y="54" width="1176" height="592" rx="32" fill="#020617" opacity=".58" stroke="#1E293B"/>
  <text class="title" x="82" y="100">Systems theater</text><text class="sub" x="82" y="130">A cinematic map of backend, orchestration, cloud runtime, data, and observability layers</text>
  <circle class="rotate" cx="640" cy="376" r="206" stroke="url(#wire)" stroke-width="2.5" stroke-dasharray="4 16" opacity=".75"/>
  <circle class="rotate" cx="640" cy="376" r="132" stroke="#38BDF8" stroke-width="2" stroke-dasharray="3 13" opacity=".42"/>
  <path class="wire" d="M640 376L238 226M640 376L1042 226M640 376L238 528M640 376L1042 528M640 376V590" stroke="url(#wire)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <g transform="translate(500 248)"><rect width="280" height="256" rx="34" fill="#020617" stroke="url(#wire)" stroke-width="3"/><circle class="pulse" cx="140" cy="105" r="64" fill="#0EA5E9" opacity=".18"/><text class="node" x="70" y="100">Platform</text><text class="node" x="84" y="128">Core</text><text class="nodeSub" x="62" y="164">reliability / scale / clarity</text><rect x="56" y="190" width="168" height="32" rx="16" fill="#0F766E"/><text class="chip" x="90" y="211">production calm</text></g>
  <g transform="translate(86 168)"><rect width="318" height="146" rx="26" fill="#0F172A" stroke="#38BDF8"/><text class="micro" x="28" y="34">LAYER 01</text><text class="node" x="28" y="72">Backend APIs</text><text class="nodeSub" x="28" y="100">service boundaries, contracts, Java</text><rect x="28" y="116" width="72" height="22" rx="11" fill="#075985"/><text class="chip" x="50" y="132">Java</text><rect x="110" y="116" width="96" height="22" rx="11" fill="#075985"/><text class="chip" x="128" y="132">Spring</text></g>
  <g transform="translate(876 168)"><rect width="318" height="146" rx="26" fill="#0F172A" stroke="#14B8A6"/><text class="micro" x="28" y="34">LAYER 02</text><text class="node" x="28" y="72">Workflow Engine</text><text class="nodeSub" x="28" y="100">orchestration, retries, isolation</text><rect x="28" y="116" width="78" height="22" rx="11" fill="#0F766E"/><text class="chip" x="46" y="132">Kafka</text><rect x="116" y="116" width="82" height="22" rx="11" fill="#0F766E"/><text class="chip" x="132" y="132">Async</text></g>
  <g transform="translate(86 470)"><rect width="318" height="146" rx="26" fill="#0F172A" stroke="#22C55E"/><text class="micro" x="28" y="34">LAYER 03</text><text class="node" x="28" y="72">Cloud Runtime</text><text class="nodeSub" x="28" y="100">containers, infra automation, Linux</text><rect x="28" y="116" width="84" height="22" rx="11" fill="#15803D"/><text class="chip" x="44" y="132">Docker</text><rect x="122" y="116" width="66" height="22" rx="11" fill="#15803D"/><text class="chip" x="144" y="132">K8s</text></g>
  <g transform="translate(876 470)"><rect width="318" height="146" rx="26" fill="#0F172A" stroke="#A78BFA"/><text class="micro" x="28" y="34">LAYER 04</text><text class="node" x="28" y="72">Data Plane</text><text class="nodeSub" x="28" y="100">cache, SQL, throughput, latency</text><rect x="28" y="116" width="78" height="22" rx="11" fill="#6D28D9"/><text class="chip" x="46" y="132">Redis</text><rect x="116" y="116" width="64" height="22" rx="11" fill="#6D28D9"/><text class="chip" x="140" y="132">SQL</text></g>
  <g transform="translate(506 558)"><rect width="268" height="66" rx="22" fill="#0F172A" stroke="#F59E0B"/><text class="node" x="58" y="31">Observability</text><text class="nodeSub" x="54" y="52">metrics / traces / ownership</text></g>
</svg>
