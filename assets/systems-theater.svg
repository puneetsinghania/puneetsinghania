    <linearGradient id="wire" x1="100" y1="120" x2="1180" y2="580"><stop stop-color="#2563EB"/><stop offset="0.42" stop-color="#0EA5E9"/><stop offset="0.72" stop-color="#14B8A6"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.14"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 40px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}.sub{font:750 16px Inter,Segoe UI,Arial,sans-serif;fill:#475569}.node{font:900 21px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}.nodeSub{font:750 13px Inter,Segoe UI,Arial,sans-serif;fill:#334155}.chip{font:850 12px Inter,Segoe UI,Arial,sans-serif;fill:#FFFFFF}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#64748B;letter-spacing:1.5px}@keyframes move{to{stroke-dashoffset:-220}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}.wire{stroke-dasharray:12 16;animation:move 5s linear infinite}.pulse{animation:pulse 2.6s ease-in-out infinite}</style>
  </defs>
  <rect width="1280" height="680" rx="38" fill="url(#bg)"/>
  <g opacity="0.2"><path d="M80 142H1200M80 230H1200M80 318H1200M80 406H1200M80 494H1200M80 582H1200" stroke="#93C5FD"/><path d="M160 80V620M300 80V620M440 80V620M580 80V620M720 80V620M860 80V620M1000 80V620M1140 80V620" stroke="#93C5FD"/></g>
