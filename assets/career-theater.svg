<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560"><stop stop-color="#020617"/><stop offset=".55" stop-color="#0F172A"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="rail" x1="110" y1="300" x2="1170" y2="210"><stop stop-color="#64748B"/><stop offset=".24" stop-color="#38BDF8"/><stop offset=".50" stop-color="#14B8A6"/><stop offset=".74" stop-color="#A78BFA"/><stop offset="1" stop-color="#F97316"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="9" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
    <style>.title{font:900 38px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}.sub{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}.company{font:900 21px Inter,Segoe UI,Arial,sans-serif;fill:#FFFFFF}.role{font:750 13px Inter,Segoe UI,Arial,sans-serif;fill:#BAE6FD}.year{font:900 18px Inter,Segoe UI,Arial,sans-serif;fill:#020617}.tag{font:850 12px Inter,Segoe UI,Arial,sans-serif;fill:#E0F2FE}.micro{font:850 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8;letter-spacing:1.5px}@keyframes travel{to{stroke-dashoffset:-260}}@keyframes float{0%,100%{transform:translateY(6px)}50%{transform:translateY(-8px)}}@keyframes ping{0%,100%{opacity:.35;r:7}50%{opacity:1;r:11}}.travel{stroke-dasharray:18 16;animation:travel 6s linear infinite}.card{animation:float 5s ease-in-out infinite}.ping{animation:ping 2.4s ease-in-out infinite}</style>
  </defs>
