<svg width="1060" height="380" viewBox="0 0 1060 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Career progression dashboard without wrapper</title><desc id="desc">Animated transparent-background career dashboard for Puneet Singhania.</desc><defs><linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset=".62" stop-color="#071a2e"/><stop offset="1" stop-color="#042f3f"/></linearGradient><linearGradient id="rail" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#38bdf8"/><stop offset=".28" stop-color="#60a5fa"/><stop offset=".58" stop-color="#a78bfa"/><stop offset=".78" stop-color="#fb923c"/><stop offset="1" stop-color="#f43f5e"/></linearGradient><radialGradient id="orb" cx="50%" cy="50%" r="55%"><stop offset="0" stop-color="#22d3ee" stop-opacity=".42"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient><filter id="shadow" x="-20%" y="-25%" width="140%" height="155%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity=".34"/></filter><filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:900 34px Arial,Helvetica,sans-serif;fill:#f8fafc}.sub{font:700 13px Arial,Helvetica,sans-serif;fill:#bae6fd}.kicker{font:800 11px Arial,Helvetica,sans-serif;letter-spacing:1.6px;fill:#67e8f9}.company{font:900 17px Arial,Helvetica,sans-serif;fill:#f8fafc}.role{font:800 11px Arial,Helvetica,sans-serif;fill:#cbd5e1}.year{font:900 10px Arial,Helvetica,sans-serif;letter-spacing:1.1px;fill:#7dd3fc}@keyframes scan{0%{transform:translateX(-240px);opacity:.08}45%{opacity:.5}100%{transform:translateX(760px);opacity:.08}}.scanner{animation:scan 4.8s linear infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}.float{animation:float 4.5s ease-in-out infinite}.float2{animation:float 5.2s ease-in-out .7s infinite}.float3{animation:float 4.8s ease-in-out 1.2s infinite}</style></defs><g filter="url(#shadow)"><rect x="50" y="34" width="960" height="304" rx="30" fill="#020617"/><rect x="76" y="62" width="908" height="228" rx="22" fill="url(#screen)" stroke="#38bdf8" stroke-opacity=".35"><animate attributeName="stroke-opacity" values=".25;.75;.25" dur="4s" repeatCount="indefinite"/></rect><circle cx="530" cy="48" r="4" fill="#dbeafe" opacity=".76"/></g><g class="float" opacity=".68"><circle cx="778" cy="150" r="90" fill="url(#orb)"/></g><g class="float2" opacity=".58"><circle cx="458" cy="208" r="64" fill="url(#orb)"/></g><rect class="scanner" x="148" y="82" width="210" height="210" rx="105" fill="#22d3ee" opacity=".1"/><g transform="translate(106 95)"><text class="kicker" x="0" y="0">CAREER PROGRESSION</text><text class="title" x="0" y="42">Engineering Journey</text><text class="sub" x="0" y="68">Enterprise platforms -> communications -> consumer scale -> commerce -> cloud infrastructure</text></g><path d="M112 174 L948 174" stroke="url(#rail)" stroke-width="5" stroke-linecap="round" opacity=".72"><animate attributeName="stroke-dasharray" values="40 760;130 670;40 760" dur="5s" repeatCount="indefinite"/></path><g transform="translate(92 194)"><rect width="166" height="118" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity=".78"/><circle class="float3" cx="27" cy="28" r="13" fill="#38bdf8" filter="url(#glow)"/><text class="year" x="52" y="31">2015 - 2019</text><text class="company" x="18" y="65">Manhattan</text><text class="company" x="18" y="86">Associates</text><text class="role" x="18" y="107">Associate SWE -> SWE</text></g><g transform="translate(272 194)"><rect width="166" height="118" rx="18" fill="#141922" stroke="#ef4444" stroke-opacity=".78"/><circle class="float" cx="27" cy="28" r="13" fill="#ef4444" filter="url(#glow)"/><text class="year" x="52" y="31">2019</text><text class="company" x="18" y="65">Motorola</text><text class="company" x="18" y="86">Solutions</text><text class="role" x="18" y="107">Software Engineer</text></g><g transform="translate(452 194)"><rect width="166" height="118" rx="18" fill="#0b1f3a" stroke="#60a5fa" stroke-opacity=".8"/><circle class="float2" cx="27" cy="28" r="13" fill="#60a5fa" filter="url(#glow)"/><text class="year" x="52" y="31">2020 - 2022</text><text class="company" x="18" y="69">Jio Platforms</text><text class="role" x="18" y="100">Software Engineer III</text></g><g transform="translate(632 194)"><rect width="166" height="118" rx="18" fill="#1e1b4b" stroke="#a78bfa" stroke-opacity=".8"/><circle class="float3" cx="27" cy="28" r="13" fill="#a78bfa" filter="url(#glow)"/><text class="year" x="52" y="31">2024 - 2025</text><text class="company" x="18" y="72">Wayfair</text><text class="role" x="18" y="102">Software Engineer</text></g><g transform="translate(812 194)"><rect width="166" height="118" rx="18" fill="#240b12" stroke="#fb7185" stroke-opacity=".86"/><circle class="float" cx="27" cy="28" r="13" fill="#fb7185" filter="url(#glow)"/><text class="year" x="52" y="31">2025 - PRESENT</text><text class="company" x="18" y="65">Oracle Cloud</text><text class="company" x="18" y="86">Infrastructure</text><text class="role" x="18" y="107">Software Engineer III</text></g><path d="M106 324 L954 324" stroke="url(#rail)" stroke-width="4" stroke-linecap="round" opacity=".62"><animate attributeName="opacity" values=".35;.88;.35" dur="3.6s" repeatCount="indefinite"/></path></svg>